name: Package quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: package-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-quality:
    name: Package quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: demo
          POSTGRES_PASSWORD: demo
          POSTGRES_DB: nest_batch_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U demo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      # TypeORM tests + typeorm test factory read DB_*.
      DB_HOST: 127.0.0.1
      DB_PORT: '5432'
      DB_USER: demo
      DB_PASSWORD: demo
      DB_NAME: nest_batch_test
      # MikroORM tests, demo e2e, demo app module, and demo migrate
      # script all read DATABASE_*. Mirror the DB_* block so the
      # same service container (127.0.0.1:5432) is reachable by both
      # naming conventions. Without this, mikro-orm tests default
      # to 5434 + database `nest_batch_mikro` and ECONNREFUSE.
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: '5432'
      DATABASE_USER: demo
      DATABASE_PASSWORD: demo
      DATABASE_NAME: nest_batch_test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native modules
        run: pnpm rebuild better-sqlite3

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  e2e:
    name: E2E (testcontainers)
    # E2E job runs the testcontainer-based integration suites
    # (packages/{postgresql,mysql,drizzle,prisma,core}, etc.). Each
    # suite spins up a real Postgres / Redis / Prisma-engine container
    # on demand, so the job needs a Docker daemon — we expose one
    # via the `docker:dind` service container and route
    # testcontainers-node at it via the DOCKER_HOST env var. The
    # job runs in parallel with `package-quality` (no `needs:` edge)
    # and uses its own concurrency group, so a stale push cancels
    # this predecessor without affecting the unit-test job.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      packages: write

    services:
      docker:
        image: docker:dind
        options: --privileged

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      DOCKER_HOST: tcp://localhost:2375

    concurrency:
      group: e2e-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /var/lib/docker
          key: docker-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            docker-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native modules
        run: pnpm rebuild better-sqlite3

      - name: Build
        run: pnpm build

      - name: Test (e2e)
        run: pnpm test:e2e
