name: Release

on:
  push:
    branches: [main]

# Never run two release jobs at once.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write # create the version PR / push tags
      pull-requests: write # open the "version packages" PR

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --dir packages/prisma exec prisma generate --schema tests/fixtures/postgresql/schema.prisma

      - name: Build
        run: pnpm build

      - name: Create release PR
        # npm publishing is manual until npm trusted publishing / GitHub OIDC
        # is configured for the @nest-batch packages. This workflow only creates
        # or updates the Changesets version PR.
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
