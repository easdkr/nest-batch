services:
  postgres:
    image: postgres:16-alpine
    container_name: nest-batch-postgres
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: nest_batch_demo
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d nest_batch_demo"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-prisma:
    image: postgres:16-alpine
    container_name: nest-batch-postgres-prisma
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: nest_batch_prisma
    volumes:
      - pgdata_prisma:/var/lib/postgresql/data
      - ./packages/prisma/prisma/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d nest_batch_prisma"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-drizzle:
    image: postgres:16-alpine
    container_name: nest-batch-postgres-drizzle
    ports:
      - "5436:5432"
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: nest_batch_drizzle
    volumes:
      - pgdata_drizzle:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d nest_batch_drizzle"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-e2e:
    image: postgres:16-alpine
    container_name: nest-batch-postgres-e2e
    ports:
      - "55432:5432"
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: nest_batch_postgres_e2e
    volumes:
      - pgdata_e2e:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d nest_batch_postgres_e2e"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: nest-batch-redis
    ports: ["6379:6379"]
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: nest-batch-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'srvr' | nc localhost 2181 | grep 'Zookeeper version'"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: nest-batch-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

volumes:
  pgdata:
  pgdata_prisma:
  pgdata_drizzle:
  pgdata_e2e:
