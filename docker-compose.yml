version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: nest-batch-postgres
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: nest_batch_demo
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d nest_batch_demo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
